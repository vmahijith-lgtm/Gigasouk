# ════════════════════════════════════════════════════════════════
# railway.toml — GigaSouk Backend · Railway Deployment Config
#
# Railway reads this file from the backend/ directory.
# If you're deploying from the repo root, set the Root Directory
# to "backend" in Railway → Service → Settings → Source.
#
# Docs: https://docs.railway.app/reference/config-as-code
# ════════════════════════════════════════════════════════════════

[build]
# Dockerfile avoids Railpack/Nix images where `python` is missing from PATH (exit 127).
# See backend/Dockerfile. To use Nixpacks instead, set builder = "nixpacks" and remove dockerfilePath.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Must run through sh so $PORT expands (exec-form uvicorn gets literal "$PORT" otherwise).
startCommand = '''sh -c "exec uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1 --log-level info --timeout-keep-alive 75"'''

# ── Health Check ────────────────────────────────────────────────
# Railway pings this URL after deploy. If it returns non-200,
# the deployment is rolled back.
healthcheckPath    = "/health"
healthcheckTimeout = 30          # seconds to wait for first 200

# ── Restart Policy ─────────────────────────────────────────────
# Automatically restart if the process crashes.
restartPolicyType    = "on_failure"
restartPolicyMaxRetries = 5

# ── Notes ──────────────────────────────────────────────────────
# --workers 1 is intentional: APScheduler runs inside the uvicorn
# process. Multiple workers would each run their own scheduler,
# causing duplicate DB writes and duplicate notifications.
# See backend/Procfile for a full explanation.
